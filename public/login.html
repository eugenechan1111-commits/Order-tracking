<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amber Office — Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>
<body class="login-body">
  <div class="login-page-card">
    <div class="login-logo">Amber Office</div>
    <div class="login-subtitle">Factory Management System</div>

    <div id="login-error" class="alert-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input id="l-username" type="text" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="l-password" type="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width:100%">Login</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('ao_token');
    if (token) {
      const role = localStorage.getItem('ao_role');
      window.location.href = ['admin','super_admin'].includes(role) ? '/' : '/worker';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const username = document.getElementById('l-username').value.trim();
      const password = document.getElementById('l-password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          return;
        }
        localStorage.setItem('ao_token', data.token);
        localStorage.setItem('ao_role', data.role);
        localStorage.setItem('ao_username', data.username);
        localStorage.setItem('ao_display_name', data.display_name || data.username);
        window.location.href = ['admin','super_admin'].includes(data.role) ? '/' : '/worker';
      } catch (err) {
        errEl.textContent = 'Network error — please try again';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
  <button class="btn btn-outline btn-sm theme-toggle-btn" onclick="toggleTheme()" style="position:fixed;top:12px;right:16px">☾ Dark</button>
</body>
</html>
